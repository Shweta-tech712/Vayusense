services:
  - type: web
    name: vayusense-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.10
      - key: GEE_PROJECT_ID
        sync: false
      - key: NASA_FIRMS_KEY
        sync: false
      - key: FRONTEND_PRODUCTION_URL
        value: https://vayusense.vercel.app
